<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>純真心話大冒險 - 免費即時同步版</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center justify-center p-4 selection:bg-indigo-500 selection:text-white">

    <div id="lobby-view" class="max-w-md w-full bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700 text-center">
        <h1 class="text-3xl font-black mb-2 text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-pink-400">真心話大冒險</h1>
        <p class="text-slate-400 text-sm mb-6 font-medium">多人連線 ‧ 即時同步 ‧ 純真心話派對</p>
        
        <input id="player-name" type="text" placeholder="輸入你的暱稱" class="w-full p-3 mb-4 bg-slate-700/50 border border-slate-600 rounded-xl text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition">
        
        <div class="space-y-3">
            <button onclick="createRoom()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-indigo-600/30 active:scale-[0.98] transition">建立新房間</button>
            <div class="flex space-x-2">
                <input id="room-input" type="text" placeholder="輸入 4 碼房間號" class="w-2/3 p-3 bg-slate-700/50 border border-slate-600 rounded-xl text-white placeholder-slate-400 text-center tracking-widest font-bold focus:outline-none focus:ring-2 focus:ring-indigo-500 transition">
                <button onclick="joinRoom()" class="w-1/3 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-emerald-600/30 active:scale-[0.98] transition">加入房間</button>
            </div>
        </div>
    </div>

    <div id="room-view" class="max-w-2xl w-full bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700 text-center hidden">
        <div class="flex justify-between items-center mb-6 border-b border-slate-700 pb-4">
            <span class="text-sm bg-slate-700 px-3 py-1 rounded-full text-slate-300 font-medium">玩家：<span id="display-name" class="text-indigo-300"></span></span>
            <h2 class="text-lg font-bold text-slate-400">房間號碼：<span id="display-room-code" class="text-white text-2xl font-black tracking-wider ml-1">----</span></h2>
        </div>

        <div class="bg-slate-900 rounded-2xl p-8 my-8 min-h-[180px] flex items-center justify-center border border-slate-700/50 shadow-inner">
            <p id="question-text" class="text-xl md:text-2xl font-bold leading-relaxed text-slate-100">正在下載最新雲端題庫...</p>
        </div>

        <button id="draw-btn" onclick="drawQuestion()" class="bg-gradient-to-r from-pink-500 to-indigo-500 hover:from-pink-600 hover:to-indigo-600 text-white font-black text-lg py-4 px-10 rounded-xl shadow-lg shadow-indigo-500/20 transform active:scale-95 transition hidden">
            🎲 隨機抽取真心話
        </button>
        <p id="not-host-msg" class="text-slate-400 italic text-sm bg-slate-900/50 py-3 rounded-xl border border-slate-700/30">只有房長可以點擊抽題，你的螢幕會自動即時同步！</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 已嵌入你提供的專案金鑰
        const firebaseConfig = {
            apiKey: "AIzaSyDHlbNgsrh0ApVs0jNJWN0OYa-XwrvAABg",
            authDomain: "gc-truth-or-dare.firebaseapp.com",
            projectId: "gc-truth-or-dare",
            storageBucket: "gc-truth-or-dare.firebasestorage.app",
            messagingSenderId: "285951986533",
            appId: "1:285951986533:web:a341479d15d975882a6f8c",
            measurementId: "G-ZHZXETWEQ1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let questions = [];
        let currentRoomCode = "";
        let isHost = false;
        let myName = "";

        // 使用免費免費 CDN 繞過 GitHub 限制，完美抓取題庫資料
        async function loadQuestions() {
            try {
                // 使用 jsDelivr 代理讀取你 GitHub Repository (gc-apps-tw/tod) 裡的 main 分支下的 ques 檔案
                const response = await fetch('https://cdn.jsdelivr.net/gh/gc-apps-tw/tod@main/ques');
                if (!response.ok) throw new Error('雲端題庫連線失敗');
                questions = await response.json();
                console.log(`題庫讀取成功！總計：${questions.length} 題。`);
                
                if (document.getElementById("question-text").innerText === "正在下載最新雲端題庫...") {
                    document.getElementById("question-text").innerText = "正在等待房長抽題...";
                }
            } catch (error) {
                console.error("無法自外部網址讀取題庫 JSON:", error);
                document.getElementById("question-text").innerText = "錯誤：無法連線至雲端題庫，請確認 GitHub 檔案格式或路徑！";
            }
        }

        // 開啟網頁自動讀取
        loadQuestions();

        // 建立房間
        window.createRoom = async function() {
            myName = document.getElementById("player-name").value.trim();
            if (!myName) return alert("請先輸入暱稱");
            if (questions.length === 0) return alert("題庫下載中，請稍候再試！");

            currentRoomCode = Math.floor(1000 + Math.random() * 9000).toString();
            isHost = true;

            try {
                await setDoc(doc(db, "rooms", currentRoomCode), {
                    currentQuestion: "遊戲開始！請房長按下方按鈕抽題。 🎉",
                    hostId: myName
                });
                enterRoomView();
                listenToRoom();
            } catch (error) {
                console.error("建立房間發生錯誤:", error);
                alert("建立房間失敗，請前往 Firebase 後台確認 Firestore 的安全規則（Rules）是否已開啟允許讀寫！");
            }
        }

        // 加入房間
        window.joinRoom = async function() {
            myName = document.getElementById("player-name").value.trim();
            currentRoomCode = document.getElementById("room-input").value.trim();
            if (!myName || !currentRoomCode) return alert("請輸入暱稱與房間號碼");

            const roomRef = doc(db, "rooms", currentRoomCode);
            try {
                const roomSnap = await getDoc(roomRef);
                if (roomSnap.exists()) {
                    isHost = false;
                    enterRoomView();
                    listenToRoom();
                } else {
                    alert("找不到這個房間號碼，請確認是否輸入錯誤！");
                }
            } catch (error) {
                console.error("加入房間發生錯誤:", error);
                alert("連線資料庫失敗，請確認 Firebase 設定。");
            }
        }

        // 介面切換
        function enterRoomView() {
            document.getElementById("lobby-view").classList.add("hidden");
            document.getElementById("room-view").classList.remove("hidden");
            document.getElementById("display-name").innerText = myName;
            document.getElementById("display-room-code").innerText = currentRoomCode;

            if (isHost) {
                document.getElementById("draw-btn").classList.remove("hidden");
                document.getElementById("not-host-msg").classList.add("hidden");
            }
        }

        // 即時聯動監聽
        function listenToRoom() {
            onSnapshot(doc(db, "rooms", currentRoomCode), (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById("question-text").innerText = data.currentQuestion;
                }
            });
        }

        // 抽題同步
        window.drawQuestion = async function() {
            if (!isHost) return;
            if (questions.length === 0) return alert("目前題庫沒有題目可以抽取！");
            
            const randomIndex = Math.floor(Math.random() * questions.length);
            const nextQuestion = questions[randomIndex];

            const roomRef = doc(db, "rooms", currentRoomCode);
            try {
                await updateDoc(roomRef, {
                    currentQuestion: nextQuestion
                });
            } catch (error) {
                console.error("同步更新題目失敗:", error);
            }
        }
    </script>
</body>
</html>
