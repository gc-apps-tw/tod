    <style>
        /* 全域大圓角與微醺極光 RWD 樣式 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", Roboto, sans-serif;
            background: radial-gradient(circle at 50% 0%, #2a1b3d 0%, #0f0f12 100%);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 15px;
        }

        /* 頂級霓虹大圓角卡片 */
        .game-card {
            background: rgba(25, 20, 35, 0.85);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 71, 87, 0.15);
            width: 100%;
            max-width: 480px;
            padding: 35px 24px;
            border-radius: 28px; /* 完美極致大圓角 */
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7), 0 0 30px rgba(255, 71, 87, 0.05);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        h1 {
            font-size: 1.9rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ff4757, #ff6b81, #70a1ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 25px;
            letter-spacing: 1.5px;
        }

        /* View 檢視區切換 */
        .view { display: none; }
        .view.active { display: block; }

        /* ================= 【View 1: 房間主頁優化】 ================= */
        .room-form { display: flex; flex-direction: column; gap: 18px; }
        .input-group { display: flex; flex-direction: column; text-align: left; gap: 8px; }
        label { font-size: 0.9rem; color: #a4b0be; font-weight: 600; }
        
        input {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.1rem;
            border-radius: 16px; /* 大圓角輸入框 */
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            outline: none;
            transition: all 0.2s ease;
        }
        input:focus { border-color: #ff4757; box-shadow: 0 0 10px rgba(255, 71, 87, 0.2); }

        /* ================= 【View 2: 核心遊戲區與聊天室】 ================= */
        .room-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            background: rgba(255, 255, 255, 0.06);
            padding: 10px 18px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .room-info { font-size: 0.9rem; color: #ff6b81; font-weight: bold; }

        /* 房間控制按鈕 */
        .room-manage-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 7px 16px;
            font-size: 0.8rem;
            font-weight: 800;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .room-manage-btn.host { background: #3742fa; }
        .room-manage-btn:active { transform: scale(0.92); }

        /* 霓虹圓角題目框 */
        .question-box {
            font-size: 1.25rem;
            font-weight: 600;
            line-height: 1.6;
            color: #f1f2f6;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            padding: 22px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px; /* 大圓角題目框 */
            border: 1px solid rgba(255, 71, 87, 0.3);
            box-shadow: inset 0 0 20px rgba(255, 71, 87, 0.08);
            word-break: break-all;
        }

        /* 按鈕群組區 */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            align-items: center;
        }

        /* 隨時全功能即時聊天室 */
        .chat-container {
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px; /* 大圓角聊天區 */
            padding: 14px;
            margin-top: 22px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-messages {
            height: 180px;
            overflow-y: auto;
            text-align: left;
            font-size: 0.9rem;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 10px; }

        /* 聊天排版 */
        .msg-item { line-height: 1.5; word-break: break-all; }
        .msg-name { color: #ff6b81; font-weight: bold; margin-right: 4px; }
        .msg-name.system { color: #eed202; }
        .msg-name.host-tag { color: #1e90ff; }
        .msg-text { color: #ffffff; }

        /* 真心話特別回報區塊樣式 */
        .truth-report-block {
            background: rgba(255, 71, 87, 0.07);
            border-left: 4px solid #ff4757;
            padding: 10px 14px;
            margin: 6px 0;
            border-radius: 0 12px 12px 0;
            color: #ffcbd1;
            font-size: 0.95rem;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .chat-input-row { display: flex; gap: 8px; }
        .chat-input {
            flex: 1;
            padding: 12px 16px;
            font-size: 0.95rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.4);
            color: white;
            outline: none;
        }
        .chat-send-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 0 18px;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .chat-send-btn:active { background: rgba(255, 255, 255, 0.2); }

        /* 大圓角按鈕 */
        .main-btn {
            color: #ffffff;
            border: none;
            padding: 14px 40px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            max-width: 260px;
            margin: 0 auto;
            outline: none;
            display: block;
            transition: all 0.1s ease;
            text-align: center;
        }
        .btn-primary { background: linear-gradient(135deg, #ff4757 0%, #e84118 100%); box-shadow: 0 6px 20px rgba(255, 71, 87, 0.4); }
        .btn-secondary { background: linear-gradient(135deg, #2ed573 0%, #26af56 100%); box-shadow: 0 6px 20px rgba(46, 213, 115, 0.3); }
        .btn-room { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.15); }
        .main-btn:active { transform: scale(0.95); }

        .status-bar { text-align: center; font-size: 0.8rem; color: #747d8c; margin-top: 4px; }

        @media (max-width: 375px) {
            .game-card { padding: 25px 16px; }
            h1 { font-size: 1.5rem; }
            .question-box { font-size: 1.1rem; min-height: 100px; }
        }
    </style>
</head>

    <div class="game-card">
        <h1>🤫 真心話時間</h1>
        
        <div id="roomView" class="view active">
            <div class="room-form">
                <div class="input-group">
                    <label>玩家暱稱</label>
                    <input type="text" id="playerName" placeholder="請輸入你的暱稱...">
                </div>
                <div class="input-group">
                    <label>房間號碼 (房長自訂或組員輸入加入)</label>
                    <input type="text" id="roomNumber" placeholder="自訂或輸入現有房號...">
                </div>
                <button class="main-btn btn-primary" style="margin-top: 8px;" onclick="handleCreateRoom()">建立新房間</button>
                <button class="main-btn btn-room" onclick="handleJoinRoom()">加入已有房間</button>
            </div>
        </div>

        <div id="gameView" class="view">
            <div class="room-header">
                <div class="room-info" id="currentRoomDisplay">房號：---- | 身份：----</div>
                <button class="room-manage-btn" id="roomManageBtn" onclick="handleRoomExitOrDelete()">退出房間</button>
            </div>
            
            <div class="question-box" id="questionDisplay">
                正在等待房長抽出跨手機同步的第一道驚悚題目...
            </div>

            <div class="btn-group">
                <button class="main-btn btn-primary" id="drawBtn" onclick="drawQuestion()">抽出下一題</button>
                <div class="status-bar" id="counterDisplay">剩餘未爆彈：-- 題</div>
                
                <button class="main-btn btn-secondary" onclick="submitTruthAnswer()">回答這道題</button>
            </div>

            <div class="chat-container">
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-row">
                    <input type="text" class="chat-input" id="chatInput" placeholder="輸入你想吐槽聊天的內容..." onkeydown="if(event.key==='Enter') sendChatMessage()">
                    <button class="chat-send-btn" onclick="sendChatMessage()">聊天</button>
                </div>
            </div>
        </div>
    </div>

        // 【🔥 核心修正：優化後的建立房間邏輯，完全避開舊版可能卡死的問題】
        function handleCreateRoom() {
            myName = document.getElementById('playerName').value.trim();
            let customRoom = document.getElementById('roomNumber').value.trim();
            let customRoom = document.getElementById('roomNumber').value.trim();
            
            if (!myName) { alert('請輸入您的暱稱！'); return; }

            // 如果房長沒有輸入，就由系統隨機產生一個 4 位數房號
            if (!customRoom) {
                customRoom = Math.floor(1000 + Math.random() * 9000).toString();
            }

            currentRoomId = customRoom;
            isHost = true;
            roomRef = db.ref('rooms/' + currentRoomId);

            // 直接執行事務寫入，這樣不論房間原先存不存在，100% 都會執行成功
            roomRef.transaction((currentData) => {
                // 如果房間已存在且正在玩，就回傳阻止（防撞房）
                if (currentData && currentData.exists === true) {
                    return; // 終止事務
                }
                // 否則，直接全新建立
                return {
                    hostName: myName,
                    currentQuestion: "等待房長抽出震撼全場的第一道題目...",
                    pool: window.gameQuestions,
                    totalQuestions: window.gameQuestions.length,
                    exists: true
                };
            }, (error, committed, snapshot) => {
                if (error) {
                    alert('建立房間時發生錯誤：' + error.message);
                } else if (!committed) {
                    alert(`❌ 房號 [${currentRoomId}] 目前正有人在使用中！請更換一個數字。`);
                } else {
                    // 順利建立成功，切換畫面
                    enterRoomView();
                    sendSystemMessage(`🎉 房長 [${myName}] 建立了新房間！`);
                }
            });
        }

        // 加入已有房間
        function handleJoinRoom() {
            myName = document.getElementById('playerName').value.trim();
            const room = document.getElementById('roomNumber').value.trim();
            if (!myName || !room) { alert('請填齊暱稱與房號！'); return; }

            db.ref('rooms/' + room).once('value', (snapshot) => {
                if (!snapshot.exists() || !snapshot.val().exists) {
                    alert('❌ 錯誤：找不到該房間！房號可能不正確，或房間已被房長關閉。');
                    return;
                }

                currentRoomId = room;
                isHost = false;
                roomRef = db.ref('rooms/' + currentRoomId);

                enterRoomView();
                sendSystemMessage(`👋 玩家 [${myName}] 悄悄加入了房間。`);
            }, (error) => {
                alert("讀取資料庫失敗，請確認網路或房號：" + error.message);
            });
        }

        function enterRoomView() {
            document.getElementById('roomView').classList.remove('active');
            document.getElementById('gameView').classList.add('active');

            const manageBtn = document.getElementById('roomManageBtn');
            const drawBtn = document.getElementById('drawBtn');
            const roomDisplay = document.getElementById('currentRoomDisplay');

            if (isHost) {
                roomDisplay.innerText = `房號：${currentRoomId} | 身份：房長`;
                manageBtn.innerText = "刪除房間";
                manageBtn.classList.add('host');
                drawBtn.disabled = false;
                drawBtn.style.opacity = "1";
                drawBtn.style.cursor = "pointer";
                drawBtn.innerText = "抽出下一題";
            } else {
                roomDisplay.innerText = `房號：${currentRoomId} | 身份：組員`;
                manageBtn.innerText = "退出房間";
                manageBtn.classList.remove('host');
                drawBtn.disabled = true;
                drawBtn.style.opacity = "0.4";
                drawBtn.style.cursor = "not-allowed";
                drawBtn.innerText = "等待房長抽題...";
            }

            document.getElementById('chatMessages').innerHTML = "";

            // 🔊 同步 1：跨手機即時題目同步
            roomRef.child('currentQuestion').on('value', (snapshot) => {
                if (snapshot.exists()) {
                    localCurrentQuestion = snapshot.val();
                    document.getElementById('questionDisplay').innerText = localCurrentQuestion;
                }
            });

            // 🔊 同步 2：跨手機即時剩餘題數計數器
            roomRef.child('totalQuestions').on('value', (snapshot) => {
                if (snapshot.exists()) {
                    document.getElementById('counterDisplay').innerText = `剩餘未爆彈：${snapshot.val()} / ${window.gameQuestions.length} 題`;
                }
            });

            // 🔊 同步 3：即時聊天室與真心話發表同步
            roomRef.child('messages').off();
            roomRef.child('messages').limitToLast(50).on('child_added', (snapshot) => {
                const data = snapshot.val();
                renderMessage(data.name, data.text, data.isSystem, data.isHost, data.isTruthReport);
            });

            // 🔊 同步 4：監控房長是否刪除房間
            roomRef.child('exists').on('value', (snapshot) => {
                if (snapshot.exists() && snapshot.val() === false) {
                    alert('🚨 房長已關閉此房間，所有人強制解散！');
                    exitRoomAndReset();
                }
            });
        }

        // 刪除/退出邏輯
        function handleRoomExitOrDelete() {
            if (isHost) {
                if (!confirm("⚠️ 確定要刪除房間嗎？這會把所有人強制踢出去！")) return;
                sendSystemMessage(`🚨 房長解散了房間。`);
                roomRef.update({ exists: false }).then(() => {
                    setTimeout(() => { roomRef.remove(); }, 800);
                    exitRoomAndReset();
                });
            } else {
                if (!confirm("確定要退出目前房間嗎？")) return;
                sendSystemMessage(`🏃 玩家 [${myName}] 退出了房間。`);
                exitRoomAndReset();
            }
        }

        function exitRoomAndReset() {
            if (roomRef) {
                roomRef.child('currentQuestion').off();
                roomRef.child('totalQuestions').off();
                roomRef.child('messages').off();
                roomRef.child('exists').off();
            }
            document.getElementById('gameView').classList.remove('active');
            document.getElementById('roomView').classList.add('active');
        }

        // 隨機抽題
        function drawQuestion() {
            if (!isHost) return;

            roomRef.child('pool').once('value', (snapshot) => {
                let pool = [];
                if (snapshot.exists()) {
                    pool = snapshot.val();
                }

                if (!pool || pool.length === 0) {
                    pool = [...window.gameQuestions];
                    sendSystemMessage("🔄 所有題目皆已抽過，題庫已自動重新洗牌！");
                }

                const randomIndex = Math.floor(Math.random() * pool.length);
                const selectedQuestion = pool[randomIndex];
                pool.splice(randomIndex, 1);

                roomRef.update({
                    currentQuestion: selectedQuestion,
                    pool: pool,
                    totalQuestions: pool.length
                });

                sendSystemMessage(`🎯 房長抽出了新題目！`);
            });
        }

        // 日常純聊天發送
        function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text || !roomRef) return;

            roomRef.child('messages').push({
                name: myName,
                text: text,
                isSystem: false,
                isHost: isHost,
                isTruthReport: false
            });

            input.value = "";
            input.focus();
        }

        // 發表正式真心話回答
        function submitTruthAnswer() {
            if (!localCurrentQuestion || localCurrentQuestion.includes("等待房長抽出")) {
                alert("❌ 請先等待房長抽出題目後再回答！");
                return;
            }

            const answer = prompt(`📝 請輸入你對本題的真心話回答：\n\n【題目】：${localCurrentQuestion}`);
            if (answer === null) return;
            if (answer.trim() === "") {
                alert("回答不能為空喔！");
                return;
            }

            const formattedReport = `----------------------------------------\n問題：${localCurrentQuestion}\n\n${myName}的回答：${answer.trim()}\n----------------------------------------`;

            roomRef.child('messages').push({
                name: myName,
                text: formattedReport,
                isSystem: false,
                isHost: isHost,
                isTruthReport: true
            });
        }

        function sendSystemMessage(text) {
            if (!roomRef) return;
            roomRef.child('messages').push({
                name: "[系統]",
                text: text,
                isSystem: true,
                isHost: false,
                isTruthReport: false
            });
        }

        // 渲染到網頁畫面
        function renderMessage(name, text, isSystem, isHostTag, isTruthReport) {
            const box = document.getElementById('chatMessages');
            
            if (isTruthReport) {
                const msgHtml = `
                    <div class="truth-report-block">${escapeHtml(text)}</div>
                `;
                box.insertAdjacentHTML('beforeend', msgHtml);
            } else {
                let nameClass = "msg-name";
                if (isSystem) nameClass += " system";
                if (isHostTag) nameClass += " host-tag";

                const msgHtml = `
                    <div class="msg-item">
                        <span class="${nameClass}">${escapeHtml(name)}${isSystem?'':':'}</span>
                        <span class="msg-text">${escapeHtml(text)}</span>
                    </div>
                `;
                box.insertAdjacentHTML('beforeend', msgHtml);
            }
            
            box.scrollTop = box.scrollHeight;
        }

        function escapeHtml(string) {
            return String(string).replace(/[&<>"']/g, function (s) {
                return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[s];
            });
        }
    </script>
</body>
</html>
