<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🤫 真心話大冒險 - 極致抽題器</title>
    
    <script src="ques.js"></script>
    
    <style>
        /* 基礎樣式與 RWD 重設 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent; /* 移除手機點擊藍色陰影 */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", Roboto, sans-serif;
            background: radial-gradient(circle at center, #1e1e24 0%, #0f0f12 100%);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 遊戲主容器 RWD 優化 */
        .game-card {
            background: rgba(30, 30, 40, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            width: 100%;
            max-width: 540px;
            padding: 40px 24px;
            border-radius: 24px; /* 完美大圓角 */
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            text-align: center;
            transition: all 0.3s ease;
        }

        /* 標題優化 */
        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        /* 核心題目框（圓角、霓虹微光、轉場動畫） */
        .question-box {
            font-size: 1.35rem;
            font-weight: 600;
            line-height: 1.6;
            color: #f1f2f6;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 35px;
            padding: 24px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 18px; /* 圓角優化 */
            border: 1px solid rgba(255, 71, 87, 0.2);
            box-shadow: inset 0 0 20px rgba(255, 71, 87, 0.05);
            word-break: break-all;
            
            /* 文字淡入動畫 */
            opacity: 1;
            transition: opacity 0.2s ease-in-out;
        }

        .question-box.fade {
            opacity: 0;
        }

        /* 頂級 Q 彈大圓角抽題按鈕 */
        .draw-btn {
            background: linear-gradient(135deg, #ff4757 0%, #e84118 100%);
            color: #ffffff;
            border: none;
            padding: 16px 45px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 50px; /* 膠囊形流線圓角 */
            cursor: pointer;
            width: 85%;
            max-width: 280px;
            outline: none;
            box-shadow: 0 6px 20px rgba(255, 71, 87, 0.4);
            transition: transform 0.1s ease, box-shadow 0.2s ease, background 0.2s;
        }

        .draw-btn:hover {
            box-shadow: 0 8px 25px rgba(255, 71, 87, 0.6);
        }

        /* 手機點擊時的Q彈縮放物理回饋 */
        .draw-btn:active {
            transform: scale(0.94);
            box-shadow: 0 3px 10px rgba(255, 71, 87, 0.3);
        }

        /* 底部狀態計數器 */
        .status-bar {
            margin-top: 25px;
            font-size: 0.85rem;
            color: #747d8c;
            letter-spacing: 0.5px;
        }

        /* RWD 斷點微調（針對小螢幕手機如 iPhone SE） */
        @media (max-width: 375px) {
            .game-card {
                padding: 30px 16px;
            }
            h1 {
                font-size: 1.5rem;
            }
            .question-box {
                font-size: 1.2rem;
                min-height: 130px;
                padding: 16px;
            }
            .draw-btn {
                font-size: 1.1rem;
                padding: 14px 35px;
            }
        }
    </style>
</head>
<body>

    <div class="game-card">
        <h1>🤫 真心話時間</h1>
        
        <div class="question-box" id="questionDisplay">
            準備好了嗎？點擊下方按鈕，開啟驚悚刺激的真心話對決！
        </div>

        <button class="draw-btn" onclick="drawQuestion()">抽出下一題</button>
        
        <div class="status-bar" id="counterDisplay">剩餘珍貴題目：-- 題</div>
    </div>

    <script>
        // 本地抽題池（防止重複）
        let localQuestions = [];

        // 初始化檢查題庫
        window.onload = function() {
            initPool();
        };

        function initPool() {
            if (window.gameQuestions && Array.isArray(window.gameQuestions)) {
                localQuestions = [...window.gameQuestions];
                updateCounter();
            } else {
                document.getElementById('questionDisplay').innerHTML = "<span style='color: #eed202;'>⚠️ 偵測不到題庫！<br>請確認 GitHub 上的題目檔名是否已改為 <b>ques.js</b> 且內容格式正確！</span>";
            }
        }

        function updateCounter() {
            document.getElementById('counterDisplay').innerText = `剩餘未爆彈：${localQuestions.length} / ${window.gameQuestions ? window.gameQuestions.length : 0} 題`;
        }

        function drawQuestion() {
            const display = document.getElementById('questionDisplay');

            if (!window.gameQuestions) {
                display.innerText = "錯誤：抓取不到 window.gameQuestions，請檢查 ques.js。";
                return;
            }

            // 如果全部抽完了，自動重置
            if (localQuestions.length === 0) {
                localQuestions = [...window.gameQuestions];
                display.innerText = "🎉 太狂了！所有題目通通被你們拷問完了！重新洗牌！";
                updateCounter();
                return;
            }

            // 加入淡出動畫效果
            display.classList.add('fade');

            setTimeout(() => {
                // 隨機抽選
                const randomIndex = Math.floor(Math.random() * localQuestions.length);
                const selectedQuestion = localQuestions[randomIndex];

                // 自抽題池移除
                localQuestions.splice(randomIndex, 1);

                // 塞入新題目並淡入顯示
                display.innerText = selectedQuestion;
                updateCounter();
                display.classList.remove('fade');
            }, 180); // 動畫絲滑切換間隔
        }
    </script>

</body>
</html>
